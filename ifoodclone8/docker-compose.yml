      - project-network
  db-order_service:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=order_service
    volumes:
      - "pgdata-order_service:/var/lib/postgresql/data"
    networks:
      - project-network
  product_service:
