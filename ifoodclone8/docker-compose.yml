      - "DATABASE_URL=postgresql://postgres:postgres@db-payment_service:5432/payment_service"
      - SERVICE_NAME=payment_service
    depends_on:
      - db-payment_service
    networks:
      - project-network
  db-payment_service:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=payment_service
    volumes:
      - "pgdata-payment_service:/var/lib/postgresql/data"
    networks:
      - project-network
networks:
  project-network:
    driver: bridge
volumes:
  pgdata-user_service:
  pgdata-order_service:
  pgdata-product_service:
  pgdata-payment_service:
