services:
  user_service:
    build:
      context: ./services/user_service
      dockerfile: Dockerfile
    ports:
      - "18001:8000"
    environment:
      - "DATABASE_URL=postgresql://postgres:postgres@db-user_service:5432/user_service"
      - SERVICE_NAME=user_service
    depends_on:
      - db-user_service
    networks:
      - project-network
  db-user_service:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=user_service
    volumes:
      - "pgdata-user_service:/var/lib/postgresql/data"
    networks:
      - project-network
  order_service:
    build:
      context: ./services/order_service
      dockerfile: Dockerfile
    ports:
      - "18002:8000"
    environment:
      - "DATABASE_URL=postgresql://postgres:postgres@db-order_service:5432/order_service"
