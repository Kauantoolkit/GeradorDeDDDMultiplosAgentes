    depends_on:
      - db-product_service
    networks:
      - project-network
  db-product_service:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=product_service
    volumes:
      - "pgdata-product_service:/var/lib/postgresql/data"
    networks:
      - project-network
  payment_service:
    build:
      context: ./services/payment_service
      dockerfile: Dockerfile
    ports:
      - "18004:8000"
