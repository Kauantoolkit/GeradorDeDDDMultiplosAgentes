services:
  orders:
    build:
      context: ./services/orders
      dockerfile: Dockerfile
    ports:
      - "18001:8000"
    environment:
      - "DATABASE_URL=postgresql://postgres:postgres@db-orders:5432/orders"
      - SERVICE_NAME=orders
    depends_on:
      - db-orders
    networks:
      - project-network
  db-orders:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=orders
    volumes:
      - "pgdata-orders:/var/lib/postgresql/data"
    networks:
      - project-network
  users:
    build:
      context: ./services/users
      dockerfile: Dockerfile
    ports:
      - "18002:8000"
    environment:
      - "DATABASE_URL=postgresql://postgres:postgres@db-users:5432/users"
      - SERVICE_NAME=users
    depends_on:
      - db-users
    networks:
      - project-network
  db-users:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
    volumes:
      - "pgdata-users:/var/lib/postgresql/data"
    networks:
      - project-network
  products:
    build:
      context: ./services/products
      dockerfile: Dockerfile
    ports:
      - "18003:8000"
    environment:
      - "DATABASE_URL=postgresql://postgres:postgres@db-products:5432/products"
      - SERVICE_NAME=products
    depends_on:
      - db-products
    networks:
      - project-network
  db-products:
    image: "postgres:16"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=products
    volumes:
      - "pgdata-products:/var/lib/postgresql/data"
    networks:
      - project-network
networks:
  project-network:
    driver: bridge
volumes:
  pgdata-orders:
  pgdata-users:
  pgdata-products:
